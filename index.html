<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Impression Garden</title>
    <style>
        :root {
            --m-blue: #b5c7d3;   /* 朦胧蓝 */
            --m-rose: #e6b8af;   /* 柔和粉 */
            --m-green: #c9d6cf;  /* 苔藓绿 */
            --m-gold: #f4e8c1;   /* 晨曦金 */
            --ink: #3a3d4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #fdfdfd; color: var(--ink);
            font-family: "STSong", "SimSun", serif;
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }

        .mist-bg {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden; filter: blur(80px); opacity: 0.4;
        }
        .mist-blob {
            position: absolute; border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }
        @keyframes move {
            from { transform: translate(-20%, -20%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        header {
            height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 12px; opacity: 0.8; }
        .decoration { width: 1px; height: 50px; background: var(--m-blue); margin: 25px 0; }
        .sub-head { font-size: 0.7rem; letter-spacing: 5px; color: var(--m-blue); }

        .timeline { padding: 40px 10px; }
        .node { margin-bottom: 120px; opacity: 0; transform: translateY(40px); transition: 1.5s; }
        .node.visible { opacity: 1; transform: translateY(0); }

        .painter-frame {
            width: 85%; max-width: 320px; margin: 0 auto;
            background: #fff; padding: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .painter-frame img { 
            width: 100%; display: block; filter: saturate(0.9);
            mask-image: radial-gradient(circle, black 85%, transparent 100%);
        }

        .painter-frame img[src="images/photo2.webp"] {
            transform: rotate(180deg);
        }
        .painter-frame img[src="images/photo10.webp"] {
            transform: rotate(180deg);
        }

        .painter-text {
            margin-top: 15px; font-size: 0.8rem; line-height: 2;
            padding: 0 10px; color: #5a5e73; text-align: justify;
        }
        .painter-date {
            display: block; font-size: 0.6rem; margin-bottom: 8px;
            color: var(--m-blue); letter-spacing: 2px; border-bottom: 1px solid #f9f9f9;
        }

        #star-stage { 
            height: 480px; position: relative; overflow: hidden; margin: 60px 0;
            background: rgba(255, 255, 255, 0.2); /* 半透明白色背景 */
            backdrop-filter: blur(10px);          /* 毛玻璃模糊核心 */
            -webkit-backdrop-filter: blur(10px);   /* 兼容 Safari */
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        .star-shard {
            position: absolute; width: 95px; height: 95px; object-fit: cover;
            clip-path: polygon(10% 0%, 90% 10%, 100% 50%, 80% 95%, 15% 100%, 0% 40%);
            opacity: 0.75; filter: drop-shadow(3px 3px 10px rgba(0,0,0,0.1));
        }

        /* --- 盲盒三态优化样式 --- */
        .box-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
            max-width: 350px; margin: 40px auto; 
        }
        .box-container { 
            aspect-ratio: 1; cursor: pointer; position: relative; 
            perspective: 1000px;
        }
        .box-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; border: 1px solid rgba(181, 199, 211, 0.15);
            transition: opacity 0.5s ease;
        }
        
        /* 状态 0: 爱心面 (正面) */
        .face-front { z-index: 3; font-size: 1.4rem; color: var(--m-rose); }
        
        /* 状态 1: 文字面 (水平翻转 180度) */
        .face-text { 
            transform: rotateY(180deg); background: var(--m-gold); 
            padding: 10px; font-size: 0.65rem; color: var(--ink); text-align: center;
            z-index: 2;
        }
        
        /* 状态 2: 图片面 (垂直翻转 180度) */
        .face-img { 
            transform: rotateX(180deg); overflow: hidden; 
            z-index: 1;
        }
        .face-img img { width: 100%; height: 100%; object-fit: cover; }

        /* 动画触发逻辑 */
        .box-container[data-state="1"] .box-inner { transform: rotateY(180deg); }
        .box-container[data-state="2"] .box-inner { transform: rotateX(180deg); }

        .prize-btn {
            display: none; margin: 50px auto; padding: 15px 40px;
            background: transparent; border: 1px solid var(--ink);
            color: var(--ink); font-size: 0.75rem; letter-spacing: 5px; cursor: pointer;
        }

        #letter-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); padding: 40px 20px;
        }
        .letter-wrap {
            max-width: 420px; margin: 10vh auto; padding: 40px 20px;
            border-top: 1px solid var(--m-blue); border-bottom: 1px solid var(--m-blue);
            line-height: 2.5; text-align: center; font-size: 0.9rem;
        }
        #letterBody {
            text-align: left;           /* 缩进通常配合左对齐更有感觉 */
            text-indent: 2em;           /* 首行缩进 2 字符 */
            padding: 0 10px;            /* 增加一点侧边距 */
        }
    </style>
</head>
<body>

    <div class="mist-bg">
        <div class="mist-blob" style="width: 400px; height: 400px; background: var(--m-blue); top: -5%; left: -5%;"></div>
        <div class="mist-blob" style="width: 500px; height: 500px; background: var(--m-rose); bottom: -10%; right: -5%; animation-delay: -5s;"></div>
    </div>

    <header>
        <h1>Anniversary.</h1>
        <div class="decoration"></div>
        <p class="sub-head">和楼楼的两年！</p>
    </header>

    <div class="timeline" id="timelineList"></div>

    <section id="star-stage">
        <div style="position: absolute; width: 100%; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; pointer-events: none;">
            <div id="timer" style="font-size: 1.5rem; letter-spacing: 3px;"></div>
            <p style="font-size: 0.6rem; color: var(--m-blue); margin-top: 12px; letter-spacing: 4px;">相距 <span id="dist">---</span> KM</p>
        </div>
    </section>

    <section style="padding-bottom: 80px;">
        <div class="box-grid" id="boxGrid"></div>
        <button id="prizeBtn" class="prize-btn" onclick="openLetter()">阅读小龙信件</button>
    </section>

    <div id="letter-overlay">
        <div class="letter-wrap">
            <div id="letterBody" style="white-space: pre-wrap;"></div>
            <p onclick="closeLetter()" style="margin-top: 50px; font-size: 0.7rem; color: var(--m-blue); cursor: pointer; letter-spacing: 4px;">[ 返回 ]</p>
        </div>
    </div>

    <script>
        // 时间轴数据
        const timelineData = [
            { d: "2024.01", t: "和楼楼在乐桥相遇了！两个人默默地互相偷看对方。直到楼楼主动来加龙，我们就这样开始了！" },
            { d: "2024.04", t: "龙去找楼楼了！两个人在公园里划小船，聊了很多很多！躺在一起看公主学院嘿嘿。然后，窝们在一起了！" },
            { d: "2024.05", t: "第一个5.20，送了楼楼花！" },
            { d: "2024.05", t: "楼楼来北京找龙！一起牵手在老北京city walk（走走）" },
            { d: "2024.08", t: "和楼楼公费度蜜月！七夕节突然送了一堆花惊喜楼楼嘿嘿嘿" },
            { d: "2024.09", t: "楼楼和小龙一起去大连和沈阳！在海边漫步，看海浪，看海鸥……哎呀被晒伤了！" },
            { d: "2024.10", t: "国庆节一起去了郑州、开封、洛阳！特种兵打卡了好多地方——墓葬博物馆有趣！" },
            { d: "2024.11", t: "楼楼给小龙寄的生日大礼包！感动……最喜欢楼楼了！" },
            { d: "2024.11", t: "楼楼又来北京了！两个人一起吃了蛋糕、看了祝寿视频哈哈哈" },
            { d: "2025.01", t: "和楼楼在上海看旅行团乐队的演唱会！氛围太好了！" },
            { d: "2025.01", t: "和楼楼在苏州约会了很多次，美好的日常喔" },
            { d: "2025.02", t: "一起去无锡看红嘴鸥！一边哭哭一边又幸福着！" },
            { d: "2025.02", t: "楼楼上学行前饭" },
            { d: "2025.06", t: "一起去了马来西亚！在亚庇游红树林、看日落萤火虫，在吉隆坡逛街……" },
            { d: "2025.11", t: "楼楼回归！二人在作品集与上班中偷偷约会很多次嘿嘿" },
            { d: "2025.12", t: "楼楼过生日！这次两个人呆在一起！和楼的友们很开心地玩了桌游。" },
            { d: "2025.12", t: "跨年夜，我们在迪士尼，超高效率地玩了一整天！" },
            { d: "2026.01", t: "一起去了下雪的庐山！很幸运地最后一天见到了真的大雪！" }
        ];

        const boxTexts = ["米老板楼楼", "小狗抱抱！", "擦鞋中", "绘画大师", "老式情侣照", "滑滑梯", "一顶大帽子",  "哼哼", "两个人嚼嚼吐吐", "霸总楼楼", "哈！", "吓你一跳"];

        // 渲染时间轴
        const tList = document.getElementById('timelineList');
        timelineData.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'node';
            div.innerHTML = `
                <div class="painter-frame">
                    <img src="images/photo${i+1}.webp">
                    <div class="painter-text"><span class="painter-date">${item.d}</span>${item.t}</div>
                </div>
            `;
            tList.appendChild(div);
        });

        // 渲染星碎片
        const stars = [];
        const stage = document.getElementById('star-stage');
        for(let i=1; i<=12; i++) {
            const img = document.createElement('img');
            img.src = `images/star${i}.webp`;
            img.className = 'star-shard';
            stage.appendChild(img);
            stars.push({
                el: img, x: Math.random() * window.innerWidth, y: Math.random() * 450,
                vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
                rot: Math.random()*360, vr: (Math.random()-0.5)*0.5
            });
        }
        function animate() {
            stars.forEach(s => {
                s.x += s.vx; s.y += s.vy; s.rot += s.vr;
                if(s.x < -100) s.x = window.innerWidth;
                if(s.x > window.innerWidth) s.x = -100;
                if(s.y < 0 || s.y > 450) s.vy *= -1;
                s.el.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rot}deg)`;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 盲盒逻辑整合：爱心 -> 文字 -> 图片 ---
        const bGrid = document.getElementById('boxGrid');
        let count = new Set();
        boxTexts.forEach((txt, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'box-container';
            wrap.dataset.state = "0"; 
            wrap.innerHTML = `
                <div class="box-inner">
                    <div class="face face-front">❤</div>
                    <div class="face face-text">${txt}</div>
                    <div class="face face-img"><img src="images/box${i+1}.webp"></div>
                </div>
            `;
            wrap.onclick = () => {
                let s = (parseInt(wrap.dataset.state) + 1) % 3; 
                wrap.dataset.state = s;
                
                // 状态机：手动处理翻转时的层级可见性
                const faces = wrap.querySelectorAll('.face');
                if (s === 1) { // 翻转到文字
                    faces[0].style.opacity = "0"; // 隐藏爱心
                    faces[1].style.opacity = "1"; // 显示文字
                    faces[2].style.opacity = "0"; // 确保图片不干扰
                } else if (s === 2) { // 翻转到图片
                    faces[1].style.opacity = "0"; 
                    faces[2].style.opacity = "1";
                } else { // 回到爱心
                    faces[0].style.opacity = "1";
                    faces[1].style.opacity = "1"; // CSS backface 会处理
                    faces[2].style.opacity = "1";
                }

                if(s !== 0) count.add(i);
                if(count.size === 12) document.getElementById('prizeBtn').style.display = 'block';
            };
            bGrid.appendChild(wrap);
        });

        // 计时器
        setInterval(() => {
            const diff = new Date() - new Date("2024-04-28T09:00:00+08:00");
            const d = Math.floor(diff/86400000);
            const h = Math.floor((diff/3600000)%24);
            const m = Math.floor((diff/60000)%60);
            const s = Math.floor((diff/1000)%60);
            document.getElementById('timer').innerText = `${d}D ${h}H ${m}M ${s}S`;
        }, 1000);

        // 距离定位
        navigator.geolocation.getCurrentPosition(p => {
            const targetLat = 39.92, targetLng = 116.48;
            const R = 6371;
            const dLat = (p.coords.latitude - targetLat) * Math.PI / 180;
            const dLng = (p.coords.longitude - targetLng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(targetLat*Math.PI/180) * Math.cos(p.coords.latitude*Math.PI/180) * Math.sin(dLng/2)**2;
            document.getElementById('dist').innerText = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        });

        function openLetter() {
            document.getElementById('letter-overlay').style.display = 'block';
            const text = "致 最爱的楼楼宝宝：\n\n和这个最最喜欢的宝宝在一起两年了！\n从一开始的两个人类慢慢地变得更近，真的很神奇！\n和宝宝有快乐地在床上翻滚、偷偷地在路上亲亲、暗自地两个人恼火哭哭、亲密地贴贴！和宝宝一起出门总是有神奇的事发生！然后两个人变得困困的哈哈哈哈（亲）总是感觉在楼楼边上饭也吃得香了觉也睡的香了（一款小龙生活必备的宝宝）！\n现在变得像家人一样彼此相信又安心，和宝宝变得越来越近！\n是楼楼让小龙知道了，喜欢楼楼，喜欢的是一整个楼楼！想要和楼楼手拉手一起在这个世界上探索、一起度过平凡与不平凡的日子（两个小人拉着手快速走走走）。\n二周年快乐，我爱你，不止今天（么么） \n (一个狂做答辩ppt的龙)";
            let i = 0; const body = document.getElementById('letterBody'); body.innerText = "";
            const writer = setInterval(() => {
                if(i < text.length) body.innerText += text[i++];
                else clearInterval(writer);
            }, 70);
        }
        function closeLetter() { document.getElementById('letter-overlay').style.display = 'none'; }

        window.onscroll = () => {
            document.querySelectorAll('.node').forEach(n => {
                if(n.getBoundingClientRect().top < window.innerHeight * 0.85) n.classList.add('visible');
            });
        };
    </script>
</body>
</html>
